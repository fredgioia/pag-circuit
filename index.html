<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAG Safety Gating Circuit — Solms &amp; Friston Variables</title>
<style>
  :root {
    --p: #1a1a1a; --s: #555; --t: #999; --b: #ccc; --bg2: #f5f5f5;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-text-info: #185FA5; --color-background-info: #E6F1FB; --color-border-info: #85B7EB;
    --color-text-success: #3B6D11; --color-text-danger: #A32D2D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --p: #e8e8e8; --s: #aaa; --t: #777; --b: #444; --bg2: #2a2a2a;
      --color-text-info: #85B7EB; --color-background-info: #0C447C; --color-border-info: #378ADD;
      --color-text-success: #97C459; --color-text-danger: #F09595;
    }
    body { background: #1a1a1a; }
  }
  body { margin:0; padding:20px; font-family:var(--font-sans); background:#fff; display:flex; flex-direction:column; align-items:center; }
  .wrapper { max-width:720px; width:100%; }
  .ctx-text { transition: opacity 0.4s; }
  .response-text { transition: opacity 0.4s; font-weight: 500; }
  .scenario-btn {
    font-family:var(--font-sans); font-size:13px; font-weight:500;
    padding:6px 16px; border-radius:6px; border:1px solid var(--b);
    background:var(--bg2); color:var(--s); cursor:pointer; transition:all 0.2s;
  }
  .scenario-btn.active {
    background:var(--color-background-info); color:var(--color-text-info);
    border-color:var(--color-border-info);
  }
  .anim { transition: stroke-width 0.5s, opacity 0.5s; }
  .pulse { animation: none; }
  .pulse.on { animation: pulseAnim 1.5s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .pulse.on { animation: none; } }
  @keyframes pulseAnim { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>
<div class="wrapper">
<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">
  <span style="font-size:12px;color:var(--s)">Scenario:</span>
  <button class="scenario-btn active" id="btn-hunt" onclick="setScenario('hunt')">Hunting</button>
  <button class="scenario-btn" id="btn-home" onclick="setScenario('home')">At home</button>
</div>
<svg width="100%" viewBox="0 0 680 830" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="inh-teal" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <line x1="5" y1="1" x2="5" y2="9" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ====== STIMULUS φ ====== -->
  <rect x="230" y="20" width="220" height="44" rx="8" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
  <text x="340" y="36" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="var(--p)">Gunshot</text>
  <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Sensory input</text>
  <text x="458" y="38" fill="#534AB7" font-family="Georgia,serif" font-style="italic" font-size="16">φ</text>
  <text x="476" y="38" font-family="var(--font-sans)" font-size="12" fill="#534AB7">(sensation)</text>

  <line x1="340" y1="64" x2="340" y2="103" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- ====== THALAMUS — e ====== -->
  <rect x="245" y="105" width="190" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#3C3489">Thalamus (MGN)</text>
  <text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#534AB7">Auditory relay</text>
  <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#534AB7"><tspan font-family="Georgia,serif" font-style="italic">e</tspan> — initial prediction error</text>

  <!-- FAST PATH -->
  <line x1="340" y1="175" x2="340" y2="388" stroke="#D85A30" stroke-width="2.5" marker-end="url(#arr-coral)" opacity="0.9"/>
  <text x="354" y="240" font-family="var(--font-sans)" font-size="12" fill="#D85A30" font-weight="500">Fast path</text>
  <text x="354" y="256" font-family="var(--font-sans)" font-size="12" fill="#D85A30">(raw e, unweighted)</text>

  <!-- ====== AMYGDALA — ω·e ====== -->
  <rect x="235" y="390" width="210" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="406" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#712B13">Amygdala (CeA)</text>
  <text x="340" y="424" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#993C1D">Threat-salience evaluation</text>
  <text x="340" y="442" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#993C1D"><tspan font-family="Georgia,serif" font-style="italic">ω·e</tspan> — precision-weighted error</text>

  <!-- Amygdala → PAG -->
  <line id="amyg-pag" class="anim pulse" x1="340" y1="460" x2="340" y2="558" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)" opacity="0.4"/>

  <!-- ====== PAG — ω ====== -->
  <rect x="235" y="560" width="210" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="576" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#712B13">PAG</text>
  <text x="340" y="594" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#993C1D">Affect generation</text>
  <text x="340" y="612" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#993C1D"><tspan font-family="Georgia,serif" font-style="italic">ω</tspan> — felt precision / consciousness</text>

  <!-- PAG → Response -->
  <line id="pag-resp" class="anim pulse" x1="340" y1="630" x2="340" y2="668" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)" opacity="0.4"/>

  <!-- ====== RESPONSE — M ====== -->
  <rect x="245" y="670" width="190" height="44" rx="8" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
  <text x="340" y="686" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="var(--p)">Response</text>
  <text x="340" y="702" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="var(--s)" id="resp-sub">Fight / flight / freeze</text>
  <text x="443" y="686" fill="var(--s)" font-family="Georgia,serif" font-style="italic" font-size="16">M</text>
  <text x="449" y="702" font-family="var(--font-sans)" font-size="12" fill="var(--s)">(active states)</text>

  <text class="response-text" id="resp-hunt" x="340" y="738" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="var(--color-text-success)" opacity="1">Minimal affect — no trauma</text>
  <text class="response-text" id="resp-home" x="340" y="738" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="var(--color-text-danger)" opacity="0">Intense FEAR — potential trauma</text>

  <!-- ====== SLOW PATH ====== -->
  <path d="M245 148 L180 148 L130 248" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="140" y="188" font-family="var(--font-sans)" font-size="12" fill="var(--s)" font-weight="500">Slow path</text>
  <text x="140" y="204" font-family="var(--font-sans)" font-size="12" fill="var(--s)">(contextualized e)</text>

  <!-- ====== AUDITORY CORTEX ====== -->
  <rect x="25" y="250" width="195" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="122" y="270" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#3C3489">Auditory cortex</text>
  <text x="122" y="288" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#534AB7">Pattern recognition</text>

  <line x1="122" y1="306" x2="122" y2="363" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <path d="M220 288 L233 380" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="212" y="340" text-anchor="start" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Refined φ</text>

  <!-- ====== HIPPOCAMPUS — ψ(Q) ====== -->
  <rect x="25" y="365" width="195" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="122" y="385" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#085041">Hippocampus</text>
  <text x="122" y="403" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#0F6E56">Contextual memory</text>
  <text class="ctx-text" id="ctx-hunt" x="122" y="428" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="11" fill="#0F6E56" opacity="1">"Gunshots normal here"</text>
  <text class="ctx-text" id="ctx-home" x="122" y="428" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="11" fill="#993C1D" opacity="0">No matching context</text>
  <text x="30" y="460" fill="#085041" font-family="Georgia,serif" font-style="italic" font-size="14">ψ</text>
  <text x="42" y="460" font-family="var(--font-sans)" font-size="12" fill="#085041">(Q) — generative model</text>

  <!-- ====== vmPFC ====== -->
  <rect x="490" y="400" width="165" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="572" y="420" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#085041">vmPFC</text>
  <text x="572" y="438" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="12" fill="#0F6E56">Safety prediction</text>
  <text x="572" y="468" text-anchor="middle" font-family="var(--font-sans)" font-size="12" fill="#085041">Reduces ω on e</text>

  <!-- Hippocampus → vmPFC (routed below amygdala) -->
  <path d="M220 430 L220 496 L572 496 L572 458" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>
  <text x="396" y="512" text-anchor="middle" font-family="var(--font-sans)" font-size="12" fill="var(--s)">ψ(Q) informs ω prediction</text>

  <!-- ====== INHIBITORY CONNECTIONS ====== -->

  <!-- Hippocampus → Amygdala -->
  <line id="hipp-inh" class="anim" x1="220" y1="400" x2="233" y2="400" stroke="#0F6E56" stroke-width="3" marker-end="url(#inh-teal)" opacity="0.9"/>
  <text id="hipp-inh-lbl" x="227" y="390" text-anchor="middle" font-family="var(--font-sans)" font-size="12" fill="#0F6E56" font-weight="500" opacity="0.9">↓ ω</text>

  <!-- vmPFC → Amygdala -->
  <line id="pfc-inh" class="anim" x1="490" y1="428" x2="447" y2="428" stroke="#0F6E56" stroke-width="3" marker-end="url(#inh-teal)" opacity="0.9"/>
  <text id="pfc-inh-lbl" x="469" y="418" text-anchor="middle" font-family="var(--font-sans)" font-size="12" fill="#0F6E56" font-weight="500" opacity="0.9">↓ ω</text>

  <!-- ====== FREE ENERGY EQUATION ====== -->
  <rect x="25" y="540" width="195" height="80" rx="8" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="122" y="558" text-anchor="middle" fill="var(--s)" font-family="monospace" font-size="11">e = φ(M) − ψ(Q)</text>
  <text x="122" y="576" text-anchor="middle" fill="var(--s)" font-family="monospace" font-size="11">F = ½(e·ω·e − log ω)</text>
  <text x="122" y="594" text-anchor="middle" fill="var(--s)" font-family="monospace" font-size="11">∂ω/∂t = ½(ω⁻¹ − e·e)</text>
  <text x="122" y="612" text-anchor="middle" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Solms &amp; Friston, Eq. 1–2</text>

  <!-- ====== LEGEND ====== -->
  <line x1="30" y1="800" x2="55" y2="800" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)"/>
  <text x="60" y="804" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Excitatory</text>
  <line x1="130" y1="800" x2="155" y2="800" stroke="#0F6E56" stroke-width="2.5" marker-end="url(#inh-teal)"/>
  <text x="160" y="804" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Inhibitory (↓ ω)</text>
  <line x1="260" y1="800" x2="285" y2="800" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="290" y="804" font-family="var(--font-sans)" font-size="12" fill="var(--s)">Informational</text>
</svg>
</div>

<script>
function setScenario(s) {
  const hunt = s === 'hunt';
  document.getElementById('btn-hunt').classList.toggle('active', hunt);
  document.getElementById('btn-home').classList.toggle('active', !hunt);
  document.getElementById('ctx-hunt').setAttribute('opacity', hunt ? '1' : '0');
  document.getElementById('ctx-home').setAttribute('opacity', hunt ? '0' : '1');
  const inhW = hunt ? '3' : '0.8';
  const inhOp = hunt ? '0.9' : '0.15';
  document.getElementById('hipp-inh').setAttribute('stroke-width', inhW);
  document.getElementById('hipp-inh').setAttribute('opacity', inhOp);
  document.getElementById('hipp-inh-lbl').setAttribute('opacity', inhOp);
  document.getElementById('pfc-inh').setAttribute('stroke-width', inhW);
  document.getElementById('pfc-inh').setAttribute('opacity', inhOp);
  document.getElementById('pfc-inh-lbl').setAttribute('opacity', inhOp);
  const outW = hunt ? '1' : '3.5';
  const outOp = hunt ? '0.3' : '1';
  document.getElementById('amyg-pag').setAttribute('stroke-width', outW);
  document.getElementById('amyg-pag').setAttribute('opacity', outOp);
  document.getElementById('pag-resp').setAttribute('stroke-width', outW);
  document.getElementById('pag-resp').setAttribute('opacity', outOp);
  document.getElementById('amyg-pag').classList.toggle('on', !hunt);
  document.getElementById('pag-resp').classList.toggle('on', !hunt);
  document.getElementById('resp-hunt').setAttribute('opacity', hunt ? '1' : '0');
  document.getElementById('resp-home').setAttribute('opacity', hunt ? '0' : '1');
  document.getElementById('resp-sub').textContent = hunt ? 'Orienting only' : 'Fight / flight / freeze';
}
</script>
</body>
</html>
